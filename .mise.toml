[tools]
# Go version from your go.mod file
go = "1.26.4"

# JavaScript/TypeScript toolchain (bun is the package manager + runtime for docs)
node = "24.15.0"
npm = "11.15.0"
bun = "1.3.14"

# Pre-commit for Git hooks
pre-commit = "4.6.0"

# Additional tools for development
golangci-lint = "2.12.2"
goreleaser = "2.16.0"
kind = "0.31.0"
kubectl = "1.36.1"
markdownlint-cli2 = "0.22.1"

swag = "1.16.6"
"npm:npm-check-updates" = "latest"

[env]
# Set environment variables for Go development
GO111MODULE = "on"

# Vue.js related environment variables
NODE_ENV = "development"
